name: Automated Resume Compiler

on:
  push:
    branches:
      - main
    paths:
      - 'main.tex'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex

      - name: Rename PDF Document
        run: |
          mv main.pdf "Rajoli Girisai Madhav 3 Years AWS DevOps Resume.pdf"

      - name: Commit and Push Raw PDF
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          git add "Rajoli Girisai Madhav 3 Years AWS DevOps Resume.pdf"
          git commit -m "chore: automated pdf generation [skip ci]" || echo "No changes to commit"
          git push origin main
