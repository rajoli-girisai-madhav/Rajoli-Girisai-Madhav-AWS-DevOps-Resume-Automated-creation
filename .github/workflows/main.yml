name: Automated Resume Compiler

on:
  push:
    branches:
      - main
    paths:
      - 'main.tex'
  workflow_dispatch:

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Install Tectonic Natively
        run: |
          sudo apt-get update
          sudo apt-get install -y tectonic

      - name: Compile LaTeX to PDF
        run: |
          tectonic main.tex

      - name: Upload Generated PDF Document
        uses: actions/upload-artifact@v4
        with:
          name: Clickable_Resume_PDF
          path: main.pdf
