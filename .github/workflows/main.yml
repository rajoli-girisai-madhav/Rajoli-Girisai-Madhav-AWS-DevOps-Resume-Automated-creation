name: Automated Resume Compiler

on:
  push:
    branches:
      - main
    paths:
      - 'main.tex'
  workflow_dispatch:

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex

      - name: Upload Generated PDF Document
        uses: actions/upload-artifact@v4
        with:
          name: Clickable_Resume_PDF
          path: main.pdf
