name: Automated Resume Compiler

on:
  push:
    branches:
      - main
    paths:
      - 'main.tex'

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Tectonic Compiler Engine
        uses: tectonic-typesetting/setup-tectonic@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile LaTeX to PDF
        run: |
          tectonic main.tex

      - name: Upload Generated PDF Document
        uses: actions/upload-artifact@v4
        with:
          name: Clickable_Resume_PDF
          path: main.pdf
